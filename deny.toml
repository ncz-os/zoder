# cargo-deny config for the ncz-os Rust quality gate. Schema v2.
[advisories]
version = 2
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause", "BSD-3-Clause", "ISC",
  "Unicode-3.0", "Unicode-DFS-2016", "Zlib",
  "MPL-2.0", "CC0-1.0", "0BSD", "CDLA-Permissive-2.0", "BSL-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
