name: zoder release builds

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macos-arm64,   runner: macos-14,         target: aarch64-apple-darwin,        artifact: zoder-macos-arm64,   ext: "" }
          - { name: macos-x86_64,  runner: macos-13,         target: x86_64-apple-darwin,         artifact: zoder-macos-x86_64,  ext: "" }
          - { name: linux-x86_64,  runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu,    artifact: zoder-linux-x86_64,  ext: "" }
          - { name: linux-arm64,   runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu,   artifact: zoder-linux-arm64,   ext: "" }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add "${{ matrix.target }}"
      - name: Build
        shell: bash
        run: cargo build --release --bin zoder --target "${{ matrix.target }}"
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/zoder${{ matrix.ext }}" "dist/zoder${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
