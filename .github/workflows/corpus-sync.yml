name: Corpus & Pricing Sync

# Refresh the public, self-serve artifacts that zoder + the tokenomics plugins
# raw-pull from main:
#   corpus/model_corpus.json   classified routing corpus (capability + workflow)
#   pricing/catalog.json       per-token rates
#   bench/overlay.json         combined multi-source bench + arena.ai overlay
#
# Runs daily: fetch the live leaderboards/pricing, combine + score, rebuild the
# corpus, and commit only when something changed. All sources are public; each
# fetcher is best-effort so one upstream outage degrades coverage, not the run.

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: corpus-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fetcher deps
        run: pip install --quiet pyyaml

      - name: Fetch leaderboards + arena (best-effort)
        run: |
          mkdir -p bench/raw
          run() { echo "::group::$1"; python3 "scripts/$1" "${@:2}" || echo "::warning::$1 failed — degrading coverage"; echo "::endgroup::"; }
          run fetch-vals-swebench.py   --json bench/raw/vals-swebench.json
          run fetch-aider-polyglot.py  --json bench/raw/aider-polyglot.json
          run fetch-arena.py           --out-dir bench/raw
          run fetch-scale.py           --json bench/raw/scale-seal.json
          run fetch-terminal-bench.py  --json bench/raw/terminal-bench.json

      - name: Combine bench + arena overlay
        run: python3 scripts/build-bench-overlay.py --out-dir .

      - name: Rebuild corpus + pricing
        run: python3 scripts/build-public-corpus.py --out-dir .

      - name: Commit refreshed artifacts (only if changed)
        run: |
          git config user.name "zoder corpus sync"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add corpus/model_corpus.json pricing/catalog.json bench/overlay.json
          if git diff --cached --quiet; then
            echo "corpus/pricing unchanged — nothing to commit"
            exit 0
          fi
          stamp="$(date -u +%Y-%m-%d)"
          scored="$(python3 -c "import json;d=json.load(open('corpus/model_corpus.json'));print(d.get('scored','?'),d.get('routable','?'))")"
          git commit -m "data(corpus): daily sync ${stamp} (scored/routable: ${scored})"
          git push
