name: weekly stack container (ghcr, multi-arch)

# The full zoder stack image (zoder + zerocode + zeroclaw + goose) built for
# BOTH linux/amd64 and linux/arm64 and published to ghcr.io/ncz-os/zoder. Built
# on GitHub because GitLab.com has no free arm64 runner (only self-hosted ULTRA),
# whereas GitHub has free NATIVE arm64 runners — so each arch compiles natively
# (no QEMU-slow arm64 build, no self-hosted dependency). ghcr.io is the
# topology-sanctioned GitHub role (registry hosting). Standard docker
# build-per-arch-by-digest → merge-manifest pattern.

on:
  schedule:
    - cron: "30 9 * * 1"   # Mondays 09:30 UTC
  workflow_dispatch:

concurrency:
  group: container-weekly
  cancel-in-progress: false

permissions:
  contents: read
  packages: write          # push to ghcr.io/ncz-os/*

env:
  IMAGE: ghcr.io/ncz-os/zoder
  ENGINE_REPO: gitlab.com/ncz-os/zeroclaw.git
  ENGINE_BRANCH: zoder-integration

jobs:
  build:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve engine SHA (zoder-integration HEAD)
        id: sha
        env:
          ENGINE_USER: ${{ secrets.GITLAB_ENGINE_USER }}
          ENGINE_TOKEN: ${{ secrets.GITLAB_ENGINE_TOKEN }}
        run: |
          set -euo pipefail
          SHA="$(git ls-remote "https://${ENGINE_USER}:${ENGINE_TOKEN}@${ENGINE_REPO}" "refs/heads/${ENGINE_BRANCH}" | cut -f1)"
          case "$SHA" in *[!0-9a-fA-F]*|'') echo "bad engine SHA" >&2; exit 1;; esac
          [ "${#SHA}" -eq 40 ] || { echo "engine SHA not 40 hex" >&2; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build + push by digest (${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false          # keep the engine-token build-arg out of attestations
          build-args: |
            ZEROCLAW_REPO=https://${{ secrets.GITLAB_ENGINE_USER }}:${{ secrets.GITLAB_ENGINE_TOKEN }}@gitlab.com/ncz-os/zeroclaw.git
            ZEROCLAW_REF=${{ steps.sha.outputs.sha }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create multi-arch manifest (weekly-<ISOweek> + latest)
        run: |
          set -euo pipefail
          WEEK="$(date -u +%G-W%V)"
          refs=""
          for f in /tmp/digests/*; do
            refs="$refs ${IMAGE}@$(cat "$f")"
          done
          echo "manifest members:$refs"
          docker buildx imagetools create \
            -t "${IMAGE}:weekly-${WEEK}" \
            -t "${IMAGE}:latest" \
            $refs
          docker buildx imagetools inspect "${IMAGE}:weekly-${WEEK}"
          echo "published ${IMAGE}:weekly-${WEEK} (+ :latest) — linux/amd64 + linux/arm64" >> "$GITHUB_STEP_SUMMARY"
