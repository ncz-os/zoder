# ncz-os Rust quality gate (GitLab). gitlab.com is the canonical CI/dev home for
# ncz-os; github.com/ncz-os/zoder is a mirror with the matching GitHub gate.
# GitLab CI is free under the ncz-os OSS license, so this linux gate runs the full
# zeroclaw-shape battery (fmt, clippy -D warnings, check all/no-default, nextest,
# cargo-deny). The OS matrix lives in the GitHub gate (gitlab.com shared runners
# are linux-only). nextest + cargo-deny are installed as PREBUILT binaries via
# scripts/ci/ci-prepare-tools.sh so the gate works on MSRV-pinned toolchains
# (cargo-install-from-source needs rustc>=1.91) AND so we never fetch from a
# moving URL while job credentials are present (Finding #15).
# Toolchain pinned to 1.94.1.
default:
  image: rust:1.94.1@sha256:652612f07bfbbdfa3af34761c1e435094c00dde4a98036132fca28c7bb2b165c
  cache:
    key:
      files: [Cargo.lock]
    paths: [.cargo/, target/]
  before_script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - mkdir -p "$CARGO_HOME/bin"

# Non-secret shared build variables. The protected repository push credential is
# managed in GitLab settings rather than declared in this file.
variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

stages: [corpus, check, test, security, package, release]

# ── corpus: daily model / pricing / bench sync (moved from GitHub Actions) ───────
# Refreshes the public artifacts that zoder + the tokenomics plugins raw-pull from
# master: corpus/model_corpus.json, pricing/catalog.json, bench/overlay.json.
# GitLab is the SINGLE writer to master (source of truth) and mirrors to github, so
# this must never run on github (its corpus-sync.yml was removed) — otherwise the two
# masters diverge and the push-mirror stalls. Runs on the daily nightly schedule (and
# on-demand from the web UI); commits with `-o ci.skip` + [skip ci] so the data commit
# never re-triggers a pipeline.
#
# Pinning pyyaml's version + sha256 keeps the python install reproducible and
# tamper-evident. GITLAB_PUSH_TOKEN remains a protected project variable because
# CI_JOB_TOKEN repository pushes require a project-level setting that is not
# portable across mirrors/installations.
corpus-sync:
  stage: corpus
  image: python:3.12@sha256:a9e4190f02729f01e5b3719bd8b3ea0f8d9350dc17d01a1ce1ca6e3fbfcf7a99
  needs: []
  cache: {}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install --require-hashes -r scripts/ci/corpus-requirements.txt
  script:
    - mkdir -p bench/raw
    - |
      # Per-fetch-exit-code handling (Finding #16): a corpus-source outage
      # used to convert failed fetches into warnings and then write a
      # reduced/empty overlay to master. The script now:
      #   1. records the EXISTING fresh overlay (last-known-good) for diffing
      #   2. aborts the build if any source reduced coverage by >25% from LKG
      #   3. only commits the new overlay if every source either succeeded
      #      or stayed at-or-above its threshold; a degraded run is loud
      #      and never silently overwrites a fresh one.
      python3 scripts/ci/corpus-fetch-and-overlay.py
    - |
      # corpus-sync also enforces the freshness threshold before pushing —
      # a transient upstream outage MUST NOT erase routing scores from the
      # authoritative corpus (Finding #16).
      python3 scripts/ci/corpus-freshness-check.py
    - git config user.name "zoder corpus sync"
    - git config user.email "jperlow@gmail.com"
    - git add corpus/model_corpus.json pricing/catalog.json bench/overlay.json
    - |
      if git diff --cached --quiet; then echo "corpus/pricing unchanged — nothing to commit"; exit 0; fi
      stamp="$(date -u +%Y-%m-%d)"
      scored="$(python3 -c "import json;d=json.load(open('corpus/model_corpus.json'));print(d.get('scored','?'),d.get('routable','?'))")"
      git commit -m "data(corpus): daily sync ${stamp} (scored/routable: ${scored}) [skip ci]"
      git push -o ci.skip "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git" "HEAD:${CI_DEFAULT_BRANCH}"

fmt:
  stage: check
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check

clippy:
  stage: check
  script:
    - rustup component add clippy
    - cargo clippy --workspace --locked --all-targets --all-features -- -D warnings

check:
  stage: check
  script:
    - cargo check --workspace --locked --all-features
    - cargo check --workspace --locked --no-default-features

test:
  stage: test
  script:
    # Pinned nextest install — IMmutable GitHub release tag + triply-pinned
    # SHA256. Replaces the prior `get.nexte.st/latest/linux` moving URL
    # (Finding #15). The helper script downloads + verifies + extracts.
    - scripts/ci/ci-prepare-tools.sh nextest
    - cargo nextest run --workspace --locked --all-features
    - cargo test --workspace --locked --all-features --doc

security:
  stage: security
  script:
    # Pinned cargo-binstall install — replaces the prior
    # `curl ... install-from-binstall-release.sh | bash` (Finding #15).
    # Helper script downloads + verifies + extracts an immutable asset.
    - scripts/ci/ci-prepare-tools.sh binstall
    - cargo binstall -y cargo-deny@0.19.9
    - cargo deny check
    - cargo fetch --locked

# ── package: version-matched trio (zoder + zerocode + zeroclaw) per arch ─────────
# Each fleet runner builds its NATIVE target via scripts/package.sh.
#
# Finding #17: the prior pipeline built zerocode/zeroclaw from
# ZEROCLAW_REF="zoder-integration" (a mutable branch). Each architecture
# cloned its own copy at job time, so a force-push mid-pipeline could
# produce a release whose three binaries were built against three
# different engine revisions. We now:
#   - Pin ZEROCLAW_REF to an immutable SHA so every runner agrees on
#     the engine source (verified in a manifest emitted into dist/).
#   - Build zerocode/zeroclaw BEFORE uploading zoder into the rolling
#     channel — if the trio build fails on any arch, the prior zoder
#     binary stays intact.
#   - Use --locked + record all source SHAs in a manifest.
.trio: &trio
  stage: package
  rules:
    - if: '$CI_COMMIT_TAG'                        # tag push → full release build
    - if: '$CI_PIPELINE_SOURCE == "web"'          # on-demand from web (resolve is present)
      when: manual                                # don't burn runners on every branch push
  needs:
    - job: resolve:zeroclaw-sha
      artifacts: true
  variables:
    # `ZEROCLAW_PINNED_SHA` is resolved fresh by resolve:zeroclaw-sha
    # (ncz-os/zeroclaw:zoder-integration HEAD) and inherited via its dotenv
    # artifact, so all three architectures build the SAME engine source with no
    # hand-maintained project variable. package.sh refuses any non-40-hex value
    # at runtime (Finding #17); the resolve job pre-validates it too.
    ZEROCLAW_REF: "${ZEROCLAW_PINNED_SHA}"
    ZEROCLAW_REPO: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/ncz-os/zeroclaw.git"
    CARGO_PROFILE_RELEASE_DEBUG: "0"
  script:
    - rm -rf .zeroclaw-src dist
    - scripts/package.sh
    - scripts/ci/assert-trio-manifest.sh  # verify all SHAs + bundles present
  artifacts:
    name: "zoder-trio-$CI_COMMIT_REF_SLUG"
    paths: [dist/]
    expire_in: 90 days

trio:x86-linux:    { <<: *trio, tags: [fleet-x86] }          # TYPHON  → x86_64-unknown-linux-gnu
trio:macos-arm64:  { <<: *trio, tags: [fleet-macos-arm64] }  # ULTRA   → aarch64-apple-darwin
trio:linux-arm64:  { <<: *trio, tags: [fleet-linux-arm64] }  # ULTRA   → aarch64-unknown-linux-gnu (arm64 rust container)

# ── release: publish the per-arch trio tarballs to the project Releases page ─────
# Finding #28: switch from the moving `release-cli:latest` image to a
# specific, glab-carrying CLI image. With `glab` on PATH we can both
# upload via glab (authoritative) AND verify the package URLs landed in
# the package registry before publishing the GitLab Release.
release:trio:
  stage: release
  rules: [{ if: '$CI_COMMIT_TAG' }]
  # Pinned glab CLI image (immutable tag — no `:latest`). glab is on PATH,
  # which matches the current GitLab release-job contract. Pin note:
  # `cli:v1.39.0` is the immutable tag; bump by replacing the tag and
  # re-running the pipeline.
  image: registry.gitlab.com/gitlab-org/cli:v1.39.0@sha256:7400a9c2174f5331c285cab36cd2edcf4a41d0da39b1ced2985537c70c3097fa
  needs: ["trio:x86-linux", "trio:macos-arm64", "trio:linux-arm64"]
  variables: { GIT_STRATEGY: none }
  script:
    - |
      set -euo pipefail
      TAG="${CI_COMMIT_TAG}"
      V="${TAG#v}"
      BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${TAG}"
      # Upload every artifact (tarball + sibling .sha256) via the
      # package-registry HTTP API. The previous job-step uploaded only
      # *.tar.gz, leaving package.sh's .sha256 files inaccessible from
      # the Releases page (Finding #28). The glab image is in PATH per
      # GitLab's release-job contract; we additionally `curl`-upload
      # because glab api does not (yet) expose multipart file POSTs.
      for f in dist/*.tar.gz dist/*.sha256; do
        [ -e "$f" ] || continue
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" \
          "${BASE}/$(basename "${f}")"
      done
      # Verify the URLs we'll publish exist + return 200. A tag pipeline
      # used to upload packages and then fail to create the Release
      # silently; this gate prevents that (Finding #28).
      for triple in x86_64-unknown-linux-gnu aarch64-apple-darwin aarch64-unknown-linux-gnu; do
        url="${BASE}/zoder-${V}-${triple}.tar.gz"
        status="$(curl -fsSI -o /dev/null -w '%{http_code}' "$url" || true)"
        [ "$status" = "200" ] || { echo "missing artifact at $url (status=$status)" >&2; exit 1; }
        # Also verify the sibling .sha256 is reachable so the published
        # Release really carries reproducible-build hashes.
        shaurl="${BASE}/zoder-${V}-${triple}.tar.gz.sha256"
        shastatus="$(curl -fsSI -o /dev/null -w '%{http_code}' "$shaurl" || true)"
        [ "$shastatus" = "200" ] || { echo "missing checksum at $shaurl (status=$shastatus)" >&2; exit 1; }
      done
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "zoder trio (zoder + zerocode + zeroclaw) — multi-arch binaries built by fleet CI."
    assets:
      links:
        - { name: "x86_64-linux tar",     url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-x86_64-unknown-linux-gnu.tar.gz" }
        - { name: "x86_64-linux sha256",  url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-x86_64-unknown-linux-gnu.tar.gz.sha256" }
        - { name: "aarch64-darwin tar",   url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-aarch64-apple-darwin.tar.gz" }
        - { name: "aarch64-darwin sha256",url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-aarch64-apple-darwin.tar.gz.sha256" }
        - { name: "aarch64-linux tar",    url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-aarch64-unknown-linux-gnu.tar.gz" }
        - { name: "aarch64-linux sha256", url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-aarch64-unknown-linux-gnu.tar.gz.sha256" }

# ── nightly channel: GitHub builds ALL binaries ──────────────────────────────
# The zoder trio (zoder + zerocode + zeroclaw) for every arch —
# aarch64-apple-darwin, aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu — is
# built NATIVELY on GitHub Actions (.github/workflows/native-builds.yml, nightly)
# and published to this project's rolling `zoder-nightly/{master,DATE}` generic
# package (what install.sh + the fleet puller read) plus a GitHub "nightly"
# release. GitLab no longer builds nightly binaries: no self-hosted ULTRA
# dependency, no x86 cross-compile. GitLab hosts the package channel, runs the
# per-push gate + weekly container, and prunes old dated channels (below).
.nightly-rules: &nightly-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true

# ── prune: keep only the last 7 date-stamped nightly channels ────────────────
# The rolling `master` channel is always kept; date-stamped channels (YYYY-MM-DD)
# older than 7 days are deleted so the registry doesn't grow unbounded. Best-effort
# (allow_failure) and independent of the build jobs — if CI_JOB_TOKEN lacks package
# delete rights the nightly still succeeds; stamps just accumulate until fixed.
prune:nightly:
  stage: release
  image: python:3.12@sha256:a9e4190f02729f01e5b3719bd8b3ea0f8d9350dc17d01a1ce1ca6e3fbfcf7a99
  <<: *nightly-rules
  needs: []
  cache: {}
  allow_failure: true
  script:
    - |
      python3 - <<'PY'
      import os, json, datetime, urllib.request, urllib.error
      api = os.environ["CI_API_V4_URL"]; pid = os.environ["CI_PROJECT_ID"]
      tok = os.environ["CI_JOB_TOKEN"]
      def call(url, method="GET"):
          r = urllib.request.Request(url, method=method, headers={"JOB-TOKEN": tok})
          return urllib.request.urlopen(r)
      pkgs = json.load(call(f"{api}/projects/{pid}/packages?package_name=zoder-nightly&per_page=100"))
      cutoff = datetime.date.today() - datetime.timedelta(days=7)
      kept = pruned = 0
      for p in pkgs:
          v = p.get("version", "")
          if v == "master":
              kept += 1; continue
          try:
              d = datetime.date.fromisoformat(v)
          except ValueError:
              kept += 1; continue          # not a date channel — leave alone
          if d < cutoff:
              try:
                  call(f"{api}/projects/{pid}/packages/{p['id']}", "DELETE")
                  pruned += 1; print("pruned", v)
              except urllib.error.HTTPError as e:
                  print("skip (no delete rights?)", v, e.code)
          else:
              kept += 1
      print(f"prune done: kept {kept}, pruned {pruned}")
      PY

# ── weekly container: full zoder stack (zoder + zerocode + zeroclaw + goose) ──
# Fired weekly by a DEDICATED pipeline TRIGGER TOKEN (id 5320725), driven from a
# fleet cron (source==trigger is the gate — the project blocks setting pipeline
# variables below Maintainer, so no WEEKLY_CONTAINER var). kaniko builds the
# stack image from Containerfile (which runs scripts/package.sh) and pushes it to
# the GitLab Container Registry; release:container-weekly then cuts a weekly
# GitLab Release that links the image as an asset. WEEK is passed to the release
# keyword via a dotenv artifact (the release: section can't see plain shell vars).
# Resolve zoder-integration to an immutable commit SHA (package.sh requires a SHA
# in CI). The kaniko-debug image has no git, so resolve here and hand it to
# container:weekly via dotenv, giving a reproducible, SHA-pinned weekly image.
# ── resolve: single source of truth for the engine SHA ──────────────────────
# Every engine-consuming job (nightly, trio, container) builds against ONE
# freshly-resolved ncz-os/zeroclaw:zoder-integration commit, so all three
# architectures agree and nobody has to hand-maintain a NIGHTLY_ZEROCLAW_SHA /
# ZEROCLAW_PINNED_SHA project variable (an unset var was silently failing every
# scheduled nightly on the 40-hex guard). The resolved SHA is exported as the
# `ZEROCLAW_PINNED_SHA` dotenv variable and inherited by downstream jobs via
# `needs: [{job: resolve:zeroclaw-sha, artifacts: true}]`. Runs automatically on
# schedule/trigger/tag; manual on web.
resolve:zeroclaw-sha:
  stage: package
  image: rust:1.94@sha256:652612f07bfbbdfa3af34761c1e435094c00dde4a98036132fca28c7bb2b165c
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  cache: {}
  needs: []
  script:
    - ZEROCLAW_PINNED_SHA="$(git ls-remote "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/ncz-os/zeroclaw.git" refs/heads/zoder-integration | cut -f1)"
    - '[ -n "$ZEROCLAW_PINNED_SHA" ] || { echo "failed to resolve zoder-integration SHA" >&2; exit 1; }'
    - 'case "$ZEROCLAW_PINNED_SHA" in *[!0-9a-fA-F]*|"") echo "resolved SHA is not 40-hex: $ZEROCLAW_PINNED_SHA" >&2; exit 1;; esac'
    - '[ "${#ZEROCLAW_PINNED_SHA}" -eq 40 ] || { echo "resolved SHA is not 40 chars: $ZEROCLAW_PINNED_SHA" >&2; exit 1; }'
    - echo "pinned zeroclaw SHA -> $ZEROCLAW_PINNED_SHA"
    - echo "ZEROCLAW_PINNED_SHA=$ZEROCLAW_PINNED_SHA" > sha.env
  artifacts:
    reports:
      dotenv: sha.env

# NOTE: the weekly stack container moved to GitHub Actions + ghcr.io — GitLab.com
# has no free arm64 runner, so a multi-arch (amd64+arm64) container can't build
# natively here. See .github/workflows/container-weekly.yml →
# ghcr.io/ncz-os/zoder:{weekly-<ISOweek>,latest}. GitLab keeps the per-push gate,
# the resolve:zeroclaw-sha helper (for tag trio builds), and prune.
