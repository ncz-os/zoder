# ncz-os Rust quality gate (GitLab). gitlab.com is the canonical CI/dev home for
# ncz-os; github.com/ncz-os/zoder is a mirror with the matching GitHub gate.
# GitLab CI is free under the ncz-os OSS license, so this linux gate runs the full
# zeroclaw-shape battery (fmt, clippy -D warnings, check all/no-default, nextest,
# cargo-deny). The OS matrix lives in the GitHub gate (gitlab.com shared runners
# are linux-only). nextest + cargo-deny are installed as PREBUILT binaries so the
# gate works on MSRV-pinned toolchains (cargo-install-from-source needs rustc>=1.91).
# Toolchain pinned to 1.94.1.
default:
  image: rust:1.94
  cache:
    key:
      files: [Cargo.lock]
    paths: [.cargo/, target/]
  before_script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - mkdir -p "$CARGO_HOME/bin"

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

stages: [corpus, check, test, security, package, release]

# ── corpus: daily model / pricing / bench sync (moved from GitHub Actions) ───────
# Refreshes the public artifacts that zoder + the tokenomics plugins raw-pull from
# master: corpus/model_corpus.json, pricing/catalog.json, bench/overlay.json.
# GitLab is the SINGLE writer to master (source of truth) and mirrors to github, so
# this must never run on github (its corpus-sync.yml was removed) — otherwise the two
# masters diverge and the push-mirror stalls. Runs on the daily nightly schedule (and
# on-demand from the web UI); commits with `-o ci.skip` + [skip ci] so the data commit
# never re-triggers a pipeline. Needs a masked GITLAB_PUSH_TOKEN CI/CD variable
# (write_repository) that is allowed to push to master.
corpus-sync:
  stage: corpus
  image: python:3.12
  needs: []
  cache: {}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install --quiet pyyaml
  script:
    - mkdir -p bench/raw
    - |
      run() { echo "== $1"; python3 "scripts/$1" "${@:2}" || echo "WARN: $1 failed — degrading coverage"; }
      run fetch-vals-swebench.py   --json bench/raw/vals-swebench.json
      run fetch-aider-polyglot.py  --json bench/raw/aider-polyglot.json
      run fetch-arena.py           --out-dir bench/raw
      run fetch-scale.py           --json bench/raw/scale-seal.json
      run fetch-terminal-bench.py  --json bench/raw/terminal-bench.json
    - python3 scripts/build-bench-overlay.py --out-dir .
    - python3 scripts/build-public-corpus.py --out-dir .
    - git config user.name "zoder corpus sync"
    - git config user.email "jperlow@gmail.com"
    - git add corpus/model_corpus.json pricing/catalog.json bench/overlay.json
    - |
      if git diff --cached --quiet; then echo "corpus/pricing unchanged — nothing to commit"; exit 0; fi
      stamp="$(date -u +%Y-%m-%d)"
      scored="$(python3 -c "import json;d=json.load(open('corpus/model_corpus.json'));print(d.get('scored','?'),d.get('routable','?'))")"
      git commit -m "data(corpus): daily sync ${stamp} (scored/routable: ${scored}) [skip ci]"
      git push -o ci.skip "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git" "HEAD:${CI_DEFAULT_BRANCH}"

fmt:
  stage: check
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check

clippy:
  stage: check
  script:
    - rustup component add clippy
    - cargo clippy --workspace --all-targets --all-features -- -D warnings

check:
  stage: check
  script:
    - cargo check --workspace --locked --all-features
    - cargo check --workspace --locked --no-default-features

test:
  stage: test
  script:
    - curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C "$CARGO_HOME/bin"
    - cargo nextest run --workspace --locked --all-features
    - cargo test --workspace --locked --all-features --doc

security:
  stage: security
  script:
    - curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
    - cargo binstall -y cargo-deny
    - cargo deny check
    - cargo fetch --locked

# ── package: version-matched trio (zoder + zerocode + zeroclaw) per arch ─────────
# Each fleet runner builds its NATIVE target via scripts/package.sh.
.trio: &trio
  stage: package
  rules:
    - if: '$CI_COMMIT_TAG'      # tag push → full release build
    - when: manual              # otherwise on-demand (don't burn runners every push)
  variables:
    ZEROCLAW_REPO: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/ncz-os/zeroclaw.git"
    ZEROCLAW_REF: "zoder-integration"
    CARGO_PROFILE_RELEASE_DEBUG: "0"
  script:
    - rm -rf .zeroclaw-src dist
    - scripts/package.sh
  artifacts:
    name: "zoder-trio-$CI_COMMIT_REF_SLUG"
    paths: [dist/]
    expire_in: 90 days

trio:x86-linux:    { <<: *trio, tags: [fleet-x86] }          # TYPHON  → x86_64-unknown-linux-gnu
trio:macos-arm64:  { <<: *trio, tags: [fleet-macos-arm64] }  # ULTRA   → aarch64-apple-darwin
trio:linux-arm64:  { <<: *trio, tags: [fleet-linux-arm64] }  # ULTRA   → aarch64-unknown-linux-gnu (arm64 rust container)

# ── release: publish the per-arch trio tarballs to the project Releases page ─────
release:trio:
  stage: release
  rules: [{ if: '$CI_COMMIT_TAG' }]
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: ["trio:x86-linux", "trio:macos-arm64", "trio:linux-arm64"]
  variables: { GIT_STRATEGY: none }
  script:
    - |
      for f in dist/*.tar.gz; do
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/$(basename "$f")"
      done
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "zoder trio (zoder + zerocode + zeroclaw) — multi-arch binaries built by fleet CI."
    assets:
      links:
        - { name: "x86_64-linux",   url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-x86_64-unknown-linux-gnu.tar.gz" }
        - { name: "aarch64-darwin", url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-aarch64-apple-darwin.tar.gz" }
        - { name: "aarch64-linux",  url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-trio/${CI_COMMIT_TAG}/zoder-${CI_COMMIT_TAG#v}-aarch64-unknown-linux-gnu.tar.gz" }

# ── nightly: rolling "master of the day" binaries ────────────────────────────
# Linux builds on GitLab shared runners (x86_64 native + aarch64 cross-compiled);
# macOS arm64 builds on ULTRA via the fleet-macos-arm64 runner. Both publish to
# the rolling `zoder-nightly/master` generic package (overwritten each night).
# Driven by a pipeline schedule with NIGHTLY=1; also runnable manually from web.
.nightly-rules: &nightly-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true

nightly:linux:
  stage: release
  <<: *nightly-rules
  needs: []
  timeout: 40m
  script:
    - rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
    - apt-get update && apt-get install -y gcc-aarch64-linux-gnu
    - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
    - cargo build --release --bin zoder --target x86_64-unknown-linux-gnu
    - cargo build --release --bin zoder --target aarch64-unknown-linux-gnu
    - |
      # Publish to the rolling `master` channel AND a date-stamped channel
      # (kept for a week by prune:nightly) so a specific nightly is reproducible:
      #   install.sh --channel 2026-07-04   pins that build.
      # Date comes from CI_PIPELINE_CREATED_AT so all jobs in one pipeline agree.
      DATE="${CI_PIPELINE_CREATED_AT%%T*}"
      for t in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
        bin="target/$t/release/zoder"
        sha256sum "$bin" | awk '{print $1}' > "$bin.sha256"
        for ch in master "$DATE"; do
          curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$bin" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-nightly/${ch}/zoder-$t"
          curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$bin.sha256" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-nightly/${ch}/zoder-$t.sha256"
        done
      done

nightly:macos-arm64:
  stage: release
  <<: *nightly-rules
  needs: []
  tags: [fleet-macos-arm64]
  timeout: 40m
  variables:
    GIT_STRATEGY: clone
  script:
    - rustup target add aarch64-apple-darwin
    - cargo build --release --bin zoder --target aarch64-apple-darwin
    - |
      DATE="${CI_PIPELINE_CREATED_AT%%T*}"
      bin="target/aarch64-apple-darwin/release/zoder"
      shasum -a 256 "$bin" | awk '{print $1}' > "$bin.sha256"
      for ch in master "$DATE"; do
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$bin" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-nightly/${ch}/zoder-aarch64-apple-darwin"
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$bin.sha256" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoder-nightly/${ch}/zoder-aarch64-apple-darwin.sha256"
      done

# ── prune: keep only the last 7 date-stamped nightly channels ────────────────
# The rolling `master` channel is always kept; date-stamped channels (YYYY-MM-DD)
# older than 7 days are deleted so the registry doesn't grow unbounded. Best-effort
# (allow_failure) and independent of the build jobs — if CI_JOB_TOKEN lacks package
# delete rights the nightly still succeeds; stamps just accumulate until fixed.
prune:nightly:
  stage: release
  image: python:3.12
  <<: *nightly-rules
  needs: []
  cache: {}
  allow_failure: true
  script:
    - |
      python3 - <<'PY'
      import os, json, datetime, urllib.request, urllib.error
      api = os.environ["CI_API_V4_URL"]; pid = os.environ["CI_PROJECT_ID"]
      tok = os.environ["CI_JOB_TOKEN"]
      def call(url, method="GET"):
          r = urllib.request.Request(url, method=method, headers={"JOB-TOKEN": tok})
          return urllib.request.urlopen(r)
      pkgs = json.load(call(f"{api}/projects/{pid}/packages?package_name=zoder-nightly&per_page=100"))
      cutoff = datetime.date.today() - datetime.timedelta(days=7)
      kept = pruned = 0
      for p in pkgs:
          v = p.get("version", "")
          if v == "master":
              kept += 1; continue
          try:
              d = datetime.date.fromisoformat(v)
          except ValueError:
              kept += 1; continue          # not a date channel — leave alone
          if d < cutoff:
              try:
                  call(f"{api}/projects/{pid}/packages/{p['id']}", "DELETE")
                  pruned += 1; print("pruned", v)
              except urllib.error.HTTPError as e:
                  print("skip (no delete rights?)", v, e.code)
          else:
              kept += 1
      print(f"prune done: kept {kept}, pruned {pruned}")
      PY
