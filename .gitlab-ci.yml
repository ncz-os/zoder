# GitLab CI — everyday Linux fmt/clippy/test gate for zoder.
# Runs on GitLab SaaS shared runners (free OSS-grant minutes) — NOT the fleet.
# Canonical merge gate; macOS-native + release artifacts live in Buildkite (ncz-os).
stages:
  - check

rust-gate:
  stage: check
  image: rust:1.93.0
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    CARGO_TERM_COLOR: "always"
  cache:
    key: "cargo-$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - target/
  before_script:
    - apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev >/dev/null
    - rustup component add rustfmt clippy
    - cargo --version && rustc --version
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets --all-features -- -D warnings
    - cargo test --workspace --locked --all-features
  rules:
    - if: "$CI_PIPELINE_SOURCE == \"merge_request_event\""
    - if: "$CI_PIPELINE_SOURCE == \"push\""
